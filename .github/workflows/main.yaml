name: Build
on: push
jobs:
  cabal-build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        ghc: ["8.0", "8.2", "8.4", "8.6", "8.8", "8.10", "9.0", "9.2"]
        cabal: ["2.4", "3.4", "3.6"]
        os: [ubuntu-latest, macOS-latest]
        # GHC 8.8 and later require Cabal 3
        exclude:
          - cabal: 2.4
            ghc: 8.8
          - cabal: 2.4
            ghc: 8.10
          - cabal: 2.4
            ghc: 9.0
          - cabal: 2.4
            ghc: 9.2
    name: Cabal ${{ matrix.cabal }} and GHC ${{ matrix.ghc }} on ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v2

      - name: Retrieve .cabal from cache
        uses: actions/cache@v2
        env:
          cache-name: cache-cabal
        with:
          path: "~/.cabal"
          key: "cabal-${{ runner.os }}-ghc-${{ matrix.ghc }}"
          restore-keys: |
            cabal-${{ runner.os }}-ghc-${{ matrix.ghc }}-
            cabal-${{ runner.os }}-

      - name: Set up Haskell
        uses: haskell/actions/setup@v1.2.9
        with:
          ghc-version: ${{ matrix.ghc }}
          cabal-version: ${{ matrix.cabal }}
          enable-stack: false

      - name: Cabal update
        run: cabal v2-update

      - name: Cabal freeze
        run: cabal v2-freeze

      - name: Cabal build
        run: cabal v2-build
